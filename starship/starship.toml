# Plastic Beach — minimal prompt
format = """
$directory\
${custom.jj}\
$character"""

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold #4ab0c8"

# jj-starship: unified jj/git prompt module
[custom.jj]
when = "jj-starship detect"
shell = ["jj-starship"]
format = "$output "

# Disable built-in git modules (jj-starship handles both)
[git_branch]
disabled = true

[git_status]
disabled = true

[character]
success_symbol = "[❯](#40bfb0)"
error_symbol = "[❯](#d06060)"
