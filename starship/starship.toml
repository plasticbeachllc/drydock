# Minimal prompt — themed by setup.py
format = """
$directory\
${custom.jj}\
$character"""

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold __THEME_DIR_COLOR__"

# jj-starship: unified jj/git prompt module
[custom.jj]
when = "jj-starship detect"
shell = ["jj-starship"]
format = "$output "

# Disable built-in git modules (jj-starship handles both)
[git_branch]
disabled = true

[git_status]
disabled = true

[character]
success_symbol = "[❯](__THEME_SUCCESS_COLOR__)"
error_symbol = "[❯](__THEME_ERROR_COLOR__)"
