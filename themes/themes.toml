[plastic-beach]
name = "Plastic Beach Basic"
tagline = "teal/cyan tropical"
motd_icon = "\U0001F30A"

[plastic-beach.base]
bg      = "#0c1a20"
dim     = "#091519"
accent  = "#1a3545"
sel     = "#2a4555"
fg      = "#d0c8be"
dim_fg  = "#8a9a9a"
bright  = "#e8e0d6"

[plastic-beach.accents]
primary   = "#20e8d0"
secondary = "#30c0e8"
warn      = "#f08030"
error     = "#e05050"
success   = "#30d890"
purple    = "#9068cc"
pink      = "#f090c0"
yellow    = "#e0d050"

[plastic-beach.terminal]
cursor      = "#40bfb0"
cursor_text = "#0c1a20"
sel_bg      = "#1a3545"
sel_fg      = "#e8e0d6"
ansi        = ["#0c1a20", "#d06060", "#50b890", "#d4a050", "#4ab0c8", "#c07ab0", "#40bfb0", "#d0c8be"]
ansi_bright = ["#1a3545", "#e07070", "#60d8a0", "#e4b060", "#5ac0d8", "#d08ac0", "#50dfc8", "#e8e0d6"]

[plastic-beach.preview]
comment = "sea glass"
module  = "plastic"
var     = "beach"
var2    = "tide"
method  = "wave"
prop    = "rising"
string  = "shore break"


